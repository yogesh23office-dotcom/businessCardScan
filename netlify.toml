[build]
  command = "npm run build"
  publish = "dist/client"

[functions]
  directory = ".netlify/v1/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "22"
  VITE_API_URL = "https://business-card-scanner-2.onrender.com"
  VITE_CONTACT_STORAGE = "indexeddb"

[dev]
  command = "npm run dev"
  port = 5173
